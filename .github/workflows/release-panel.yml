name: Release Panel

on:
  workflow_dispatch:
    inputs:
      fxp_implementation:
        description: FXP implementation bundled under the standard asset name
        required: true
        type: choice
        default: rust
        options:
          - rust
          - go
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: forwardx-release-panel-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Setup Rust
        if: github.event_name != 'workflow_dispatch' || inputs.fxp_implementation != 'go'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust cross compiler
        if: github.event_name != 'workflow_dispatch' || inputs.fxp_implementation != 'go'
        uses: taiki-e/install-action@cross

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version split
        run: pnpm check:versions

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run panel tests
        run: pnpm test:server

      - name: Run Agent tests and vet
        shell: bash
        env:
          FXP_IMPLEMENTATION: ${{ inputs.fxp_implementation || 'rust' }}
        run: |
          (cd agent && go test ./... && go vet ./...)
          (cd forwardx-fxp && go test ./... && go vet ./...)
          if [ "$FXP_IMPLEMENTATION" = "rust" ]; then
            cargo fmt --manifest-path forwardx-fxp-rust/Cargo.toml -- --check
            cargo test --manifest-path forwardx-fxp-rust/Cargo.toml --locked
            cargo clippy --manifest-path forwardx-fxp-rust/Cargo.toml --all-targets --locked
          fi

      - name: Prepare release notes
        shell: bash
        run: node scripts/extract-release-notes.mjs "${{ steps.release.outputs.version_no_v }}" > RELEASE_NOTES.md

      - name: Build panel assets
        run: pnpm build

      - name: Build bundled Agent assets
        env:
          FXP_IMPLEMENTATION: ${{ inputs.fxp_implementation || 'rust' }}
        run: bash scripts/build-agent-release.sh

      - name: Package panel runtime bundle
        shell: bash
        env:
          VERSION_NO_V: ${{ steps.release.outputs.version_no_v }}
        run: |
          mkdir -p .release dist/panel
          BUNDLE="forwardx-panel-v${VERSION_NO_V}.tar.gz"
          tar -czf ".release/${BUNDLE}" \
            dist \
            client/dist \
            drizzle \
            patches \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            scripts/install-panel-local.sh \
            scripts/install-panel-docker.sh \
            scripts/migrate-agent-legacy.sh
          cp ".release/${BUNDLE}" "dist/panel/${BUNDLE}"
          ls -lh "dist/panel/${BUNDLE}"

      - name: Upload panel bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: forwardx-panel-bundle
          path: dist/panel/*.tar.gz

      - name: Publish panel bundle to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(dist/panel/*.tar.gz)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::Panel release bundle was not generated"
            exit 1
          fi

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release edit "$RELEASE_VERSION" --notes-file RELEASE_NOTES.md
          else
            gh release create "$RELEASE_VERSION" \
              --target "$GITHUB_SHA" \
              --notes-file RELEASE_NOTES.md
          fi

          attempt=1
          delay=8
          until gh release upload "$RELEASE_VERSION" "${files[@]}" --clobber; do
            if [ "$attempt" -ge 5 ]; then
              echo "::error::Panel bundle upload failed after ${attempt} attempts"
              exit 1
            fi
            echo "Panel bundle upload failed, retrying in ${delay}s (attempt ${attempt}/5)..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push panel image
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/forwardx"
          TAG_ARGS=(-t "${IMAGE}:${VERSION}")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_ARGS+=(-t "${IMAGE}:latest")
          fi
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "FXP_IMPLEMENTATION=${{ inputs.fxp_implementation || 'rust' }}" \
            --push \
            "${TAG_ARGS[@]}" \
            .
